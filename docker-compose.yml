services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: urdu-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/model.json:/app/backend/model.json:ro
      - ./backend/tokenizer.json:/app/backend/tokenizer.json:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: urdu-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped